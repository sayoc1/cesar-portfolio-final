<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10223a" />
      <stop offset="100%" stop-color="#0b1524" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>
  <rect width="900" height="600" rx="40" fill="url(#bg)" />
  <rect x="60" y="60" width="780" height="480" rx="36" fill="#0a1830" stroke="url(#accent)" stroke-width="6" />
  <text x="120" y="150" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" fill="#ffffff" font-weight="700">Certificado de Finalización</text>
  <text x="120" y="200" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" fill="#94a3b8">Fundamentos de la Programación</text>
  <text x="120" y="240" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" fill="#86efac">Microsoft</text>
  <rect x="120" y="280" width="640" height="1" fill="#22c55e" opacity="0.75" />
  <text x="120" y="330" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" fill="#cbd5e1">Demuestra la finalización del curso y las habilidades fundamentales de programación.</text>
  <text x="120" y="360" font-family="Inter, Arial, Helvetica, sans-serif" font-size="15" fill="#94a3b8">Año: 2023</text>
  <g transform="translate(600, 370)">
    <rect x="0" y="0" width="180" height="120" rx="24" fill="#0b162a" stroke="#22c55e" stroke-width="3" />
    <text x="90" y="70" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="28" fill="#22c55e" font-weight="700">MS</text>
  </g>
</svg>

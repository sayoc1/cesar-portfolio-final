<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Turnos - Portal de Turnos</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar con logo fijo y botón hamburguesa -->
    <nav class="navbar" style="display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: linear-gradient(135deg, #004d2b 0%, #00723f 100%); height: 64px;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="nav-hamburger" id="sidebarToggle" style="background: transparent; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px;">
                <span class="material-symbols-outlined" style="font-size: 28px;">menu</span>
            </button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="/portal_turno_v2/assets/img/logo-banco.png" alt="BAV" style="height: 40px; width: auto; border-radius: 8px; background: white; padding: 3px;" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IndoaXRlIiByeD0iOCIvPjx0ZXh0IHg9IjUiIHk9IjI4IiBmb250LWZhbWlseT0iSW50ZXIsIHNhbnMtc2VyaWYiIGZpbGw9IiMwMDcyM2YiIGZvbnQtc2l6ZT0iMjAiIGZvbnQtd2VpZ2h0PSJib2xkIj5CQVY8L3RleHQ+PC9zdmc+';">
                <span style="color: white; font-weight: 700; font-size: 1.1rem;">Banco Agrícola de Venezuela</span>
            </div>
        </div>
        <div class="nav-user" id="navUser" style="display: flex; align-items: center; gap: 1rem;"></div>
    </nav>

    <div class="layout">
        <!-- ========== SIDEBAR CORREGIDO CON ENLACE A DETALLE EMPLEADO ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">PRINCIPAL</div>
                <a class="sidebar-link" href="dashboard.html">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Dashboard</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">GESTIÓN</div>
                <a class="sidebar-link" href="usuarios.html">
                    <span class="material-symbols-outlined">group</span>
                    <span>Usuarios</span>
                </a>
                <a class="sidebar-link" href="horarios.html">
                    <span class="material-symbols-outlined">calendar_month</span>
                    <span>Horarios</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">REPORTES</div>
                <a class="sidebar-link active" href="turnos.html">
                    <span class="material-symbols-outlined">schedule</span>
                    <span>Historial de Turnos</span>
                </a>
                <!-- ===== ENLACE A DETALLE EMPLEADO ===== -->
                <a class="sidebar-link" href="empleado-detalle.html">
                    <span class="material-symbols-outlined">person_search</span>
                    <span>Detalle Empleado</span>
                </a>
                <a class="sidebar-link" href="reportes.html">
                    <span class="material-symbols-outlined">trending_up</span>
                    <span>Reportes</span>
                </a>
            </div>
        </aside>
        
        <!-- Overlay para el sidebar móvil -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Historial de Turnos</h1>
                <p class="page-subtitle">Registro de entradas y salidas de empleados</p>
            </div>

            <!-- Filtros -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <h3 class="card-title"><span class="material-symbols-outlined"
                            style="font-size:20px;vertical-align:middle">filter_alt</span> Filtros</h3>
                    <button class="btn btn-sm btn-secondary" onclick="resetFilters()">Limpiar filtros</button>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Empleado</label>
                        <select class="form-select" id="filtroEmpleado" onchange="loadTurnos(1)">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fecha desde</label>
                        <input type="date" class="form-input" id="filtroDesde" onchange="loadTurnos(1)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fecha hasta</label>
                        <input type="date" class="form-input" id="filtroHasta" onchange="loadTurnos(1)">
                    </div>
                </div>
            </div>

            <!-- Tabla de turnos -->
            <div class="card">
                <div class="table-wrapper" id="turnosTable"></div>
                <div id="paginationContainer"></div>
            </div>

            <!-- Modal detalle -->
            <div class="modal-backdrop" id="detailModal" style="display:none;" onclick="closeDetail(event)">
                <div class="modal" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <h3 id="detailTitle">Detalle del Turno</h3>
                        <button class="btn btn-sm btn-secondary"
                            onclick="document.getElementById('detailModal').style.display='none'"><span
                                    class="material-symbols-outlined" style="font-size:18px">close</span></button>
                    </div>
                    <div class="modal-body" id="detailBody"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        const user = requireAuth('admin');
        if (user) {
            // Cargar usuario en el navbar
            const navUser = document.getElementById('navUser');
            if (navUser) {
                const initial = (user.nombre || "U")[0].toUpperCase();
                navUser.innerHTML = `
                    <div class="nav-avatar" style="width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem; border: 1px solid rgba(255,255,255,0.25);">${initial}</div>
                    <span class="nav-username" style="font-weight: 500; color: rgba(255,255,255,0.9); font-size: 0.875rem;">${user.nombre} ${user.apellido || ""}</span>
                    <span class="nav-role badge badge-${user.rol === "admin" ? "primary" : "success"}" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">${user.rol}</span>
                    <button class="btn btn-sm btn-outline" onclick="Auth.logout()" title="Cerrar sesión" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: white;">
                        <span class="material-symbols-outlined" style="font-size:18px">logout</span>
                    </button>
                `;
            }
            
            loadEmpleados();
            loadTurnos();
        }

        let currentPage = 1;

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '—';
            
            if (dateStr.includes('-')) {
                const partes = dateStr.split('-');
                if (partes.length === 3) {
                    return `${partes[2]}/${partes[1]}/${partes[0]}`;
                }
            }
            
            if (dateStr.includes(' ')) {
                const soloFecha = dateStr.split(' ')[0];
                if (soloFecha.includes('-')) {
                    const partes = soloFecha.split('-');
                    if (partes.length === 3) {
                        return `${partes[2]}/${partes[1]}/${partes[0]}`;
                    }
                }
            }
            
            return formatDate(dateStr);
        }

        async function loadEmpleados() {
            try {
                const res = await Usuarios.list(1, '', 100);
                const empleados = res.data.usuarios;
                const select = document.getElementById('filtroEmpleado');
                empleados.forEach(e => {
                    const opt = document.createElement('option');
                    opt.value = e.id;
                    opt.textContent = `${e.nombre} ${e.apellido}`;
                    select.appendChild(opt);
                });
            } catch (error) {
                console.error('Error cargando empleados:', error);
            }
        }

        async function loadTurnos(page = 1) {
            currentPage = page;
            
            const empId = document.getElementById('filtroEmpleado').value;
            const desde = document.getElementById('filtroDesde').value;
            const hasta = document.getElementById('filtroHasta').value;
            
            const params = {};
            if (empId) params.empleado = empId;
            if (desde) params.fecha_desde = desde;
            if (hasta) params.fecha_hasta = hasta;

            showLoading('#turnosTable');

            try {
                const res = await Turnos.list(page, params);
                const { turnos, pagination } = res.data;

                if (turnos.length === 0) {
                    document.getElementById('turnosTable').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><span class="material-symbols-outlined" style="font-size:48px">schedule</span></div>
                            <p>No se encontraron turnos con los filtros seleccionados</p>
                        </div>`;
                    document.getElementById('paginationContainer').innerHTML = '';
                    return;
                }

                const rows = turnos.map(t => {
                    let nombreEmpleado = 'ID: ' + (t.id_usuario || t.usuario_id || '?');
                    
                    if (t.nombre && t.apellido) {
                        nombreEmpleado = `${t.nombre} ${t.apellido}`;
                    } else if (t.empleado_nombre && t.empleado_apellido) {
                        nombreEmpleado = `${t.empleado_nombre} ${t.empleado_apellido}`;
                    }
                    
                    const estadoBadge = t.hora_salida
                        ? '<span class="badge badge-success">Completado</span>'
                        : '<span class="badge badge-warning">En curso</span>';
                    
                    const horaEntrada = t.hora_entrada ? t.hora_entrada.substring(11, 16) : '--:--';
                    const horaSalida = t.hora_salida ? t.hora_salida.substring(11, 16) : '—';
                    
                    return `
                        <tr>
                            <td><strong>${nombreEmpleado}</strong></td>
                            <td>${formatDateDisplay(t.fecha)}</td>
                            <td>${horaEntrada}</td>
                            <td>${horaSalida}</td>
                            <td>${estadoBadge}</td>
                            <td>
                                <div style="display: flex; gap: 0.5rem;">
                                    <button class="btn btn-sm btn-outline" onclick="viewDetail(${t.id})" title="Ver detalle del turno">
                                        <span class="material-symbols-outlined" style="font-size:16px">visibility</span>
                                    </button>
                                    <button class="btn btn-sm btn-info" onclick="verDetalleEmpleado(${t.id_usuario || t.usuario_id})" title="Ver información completa del empleado">
                                        <span class="material-symbols-outlined" style="font-size:16px">person</span>
                                        Detalle
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                }).join('');

                document.getElementById('turnosTable').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Empleado</th>
                                <th>Fecha</th>
                                <th>Entrada</th>
                                <th>Salida</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>`;

                const pagHtml = renderPagination(pagination);
                document.getElementById('paginationContainer').innerHTML = pagHtml;
                document.querySelectorAll('.page-btn').forEach(btn => {
                    btn.onclick = () => loadTurnos(parseInt(btn.dataset.page));
                });
                
            } catch (error) {
                console.error('Error cargando turnos:', error);
                showToast(error.message || 'Error al cargar turnos', 'error');
            }
        }

        function resetFilters() {
            document.getElementById('filtroEmpleado').value = '';
            document.getElementById('filtroDesde').value = '';
            document.getElementById('filtroHasta').value = '';
            loadTurnos(1);
        }

        async function viewDetail(id) {
            try {
                const res = await Turnos.get(id);
                const t = res.data.turno;
                
                let nombre = 'ID: ' + (t.id_usuario || t.usuario_id || '?');
                if (t.nombre && t.apellido) {
                    nombre = `${t.nombre} ${t.apellido}`;
                } else if (t.empleado_nombre && t.empleado_apellido) {
                    nombre = `${t.empleado_nombre} ${t.empleado_apellido}`;
                }

                let html = `
                    <div class="detail-grid">
                        <div class="detail-item"><span class="detail-label">Empleado:</span> <strong>${nombre}</strong></div>
                        <div class="detail-item"><span class="detail-label">Fecha:</span> ${formatDateDisplay(t.fecha)}</div>
                        <div class="detail-item"><span class="detail-label">Entrada:</span> ${formatTime(t.hora_entrada)}</div>
                        <div class="detail-item"><span class="detail-label">Salida:</span> ${t.hora_salida ? formatTime(t.hora_salida) : '<em>En curso</em>'}</div>
                    </div>`;

                if (res.data.novedades && res.data.novedades.length > 0) {
                    html += `<h4 style="margin-top:1.5rem;">Novedades (${res.data.novedades.length})</h4>`;
                    res.data.novedades.forEach(n => {
                        html += `<div class="detail-list-item">${n.descripcion}</div>`;
                    });
                }

                if (res.data.bitacoras && res.data.bitacoras.length > 0) {
                    html += `<h4 style="margin-top:1.5rem;">Bitácoras (${res.data.bitacoras.length})</h4>`;
                    res.data.bitacoras.forEach(b => {
                        html += `<div class="detail-list-item">${b.actividad || b.descripcion}</div>`;
                    });
                }

                document.getElementById('detailTitle').textContent = `Turno #${t.id}`;
                document.getElementById('detailBody').innerHTML = html;
                document.getElementById('detailModal').style.display = 'flex';
            } catch (error) {
                console.error('Error cargando detalle:', error);
                showToast(error.message, 'error');
            }
        }

        // ============================================
        // FUNCIÓN PARA VER DETALLE COMPLETO DEL EMPLEADO
        // ============================================
        function verDetalleEmpleado(usuarioId) {
            if (!usuarioId) {
                showToast('No se pudo identificar al empleado', 'error');
                return;
            }
            window.location.href = `empleado-detalle.html?empleado=${usuarioId}`;
        }

        function closeDetail(e) {
            if (e.target === document.getElementById('detailModal')) {
                document.getElementById('detailModal').style.display = 'none';
            }
        }

        // ============================================
        // FUNCIONES PARA EL SIDEBAR MÓVIL
        // ============================================
        function toggleSidebar(event) {
            if (event) event.preventDefault();
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (sidebar && overlay) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            }
        }

        // Cerrar sidebar con overlay y tecla Escape
        document.addEventListener('DOMContentLoaded', function() {
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', function() {
                    document.getElementById('sidebar')?.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('sidebar')?.classList.remove('active');
                    document.getElementById('sidebarOverlay')?.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });
    </script>

    <!-- CSS para asegurar que el sidebar se vea completo -->
    <style>

            width: 300px !important;
            min-width: 300px !important;

            border-right: 1px solid var(--gray-200);
            padding: 1.5rem 0;
            height: calc(100vh - 64px);
            position: sticky;
            top: 64px;
            overflow-y: auto;
            z-index: 90;
        }
        
        .sidebar-section {
            margin-bottom: 2rem;
            padding: 0 0.75rem;
        }
        
        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--gray-400);
            padding: 0 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .sidebar-link {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 12px 16px !important;
            margin: 4px 0 !important;
            border-radius: 10px !important;
            color: var(--gray-700) !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
            text-decoration: none !important;
            transition: all 0.2s ease !important;
            border-left: 3px solid transparent !important;
        }
        
        .sidebar-link .material-symbols-outlined {
            font-size: 22px !important;
            min-width: 28px !important;
        }
        
        .sidebar-link.active {
            background: var(--primary-bg) !important;
            color: var(--primary) !important;
            border-left-color: var(--primary) !important;
        }
        
        .sidebar-link.active .material-symbols-outlined {
            color: var(--primary) !important;
        }
        
        .sidebar-link:hover {
            background: var(--gray-100) !important;
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: 2px 0 15px rgba(0,0,0,0.2);
                padding-top: 70px;
            }
            
            .sidebar.active {
                left: 0;
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            
            .sidebar-overlay.active {
                display: block;
            }
            
            .nav-hamburger {
                display: flex !important;
            }
        }
        
        @media (min-width: 1025px) {
            .nav-hamburger {
                display: none !important;
            }
        }
        
        .btn-info {
            background: var(--info-bg) !important;
            color: var(--info) !important;
            border: 1px solid var(--info) !important;
        }
        
        .btn-info:hover {
            background: var(--info) !important;
            color: white !important;
        }
    </style>

</body>

</html>

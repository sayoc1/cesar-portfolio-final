<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Portal de Turnos</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <style>
        .table-wrapper {
            overflow-x: auto;
        }
        .btn-sm {
            margin: 0 2px;
        }
    </style>
</head>

<body>

    <nav class="navbar" style="display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: linear-gradient(135deg, #004d2b 0%, #00723f 100%); height: 64px;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="nav-hamburger" id="sidebarToggle" style="background: transparent; border: none; color: white; cursor: pointer; padding: 8px;">
                <span class="material-symbols-outlined" style="font-size: 28px;">menu</span>
            </button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="/portal_turno_v2/assets/img/logo-banco.png" alt="BAV" style="height: 40px; width: auto; border-radius: 8px; background: white; padding: 3px;" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IndoaXRlIiByeD0iOCIvPjx0ZXh0IHg9IjUiIHk9IjI4IiBmb250LWZhbWlseT0iSW50ZXIsIHNhbnMtc2VyaWYiIGZpbGw9IiMwMDcyM2YiIGZvbnQtc2l6ZT0iMjAiIGZvbnQtd2VpZ2h0PSJib2xkIj5CQVY8L3RleHQ+PC9zdmc+';">
                <span style="color: white; font-weight: 700; font-size: 1.1rem;">Banco Agrícola de Venezuela</span>
            </div>
        </div>
        <div class="nav-user" id="navUser"></div>
    </nav>

    <div class="layout">
        <!-- ========== SIDEBAR CORREGIDO CON TODOS LOS ENLACES ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">PRINCIPAL</div>
                <a class="sidebar-link" href="dashboard.html">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Dashboard</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">GESTIÓN</div>
                <a class="sidebar-link active" href="usuarios.html">
                    <span class="material-symbols-outlined">group</span>
                    <span>Usuarios</span>
                </a>
                <a class="sidebar-link" href="horarios.html">
                    <span class="material-symbols-outlined">calendar_month</span>
                    <span>Horarios</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">REPORTES</div>
                <a class="sidebar-link" href="turnos.html">
                    <span class="material-symbols-outlined">schedule</span>
                    <span>Historial de Turnos</span>
                </a>
                <!-- ===== ENLACE A DETALLE EMPLEADO (AHORA VISIBLE) ===== -->
                <a class="sidebar-link" href="empleado-detalle.html">
                    <span class="material-symbols-outlined">person_search</span>
                    <span>Detalle Empleado</span>
                </a>
                <a class="sidebar-link" href="reportes.html">
                    <span class="material-symbols-outlined">trending_up</span>
                    <span>Reportes</span>
                </a>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Usuarios</h1>
                <p class="page-subtitle">Gestión de usuarios del sistema</p>
            </div>

            <div id="viewList">
                <div class="toolbar">
                    <div class="search-box">
                        <span class="search-icon"><span class="material-symbols-outlined" style="font-size:18px">search</span></span>
                        <input type="text" id="searchInput" placeholder="Buscar usuario..." oninput="searchUsers()">
                    </div>
                    <button class="btn btn-primary" onclick="showForm()"><span class="material-symbols-outlined" style="font-size:18px">add</span> Nuevo Usuario</button>
                </div>

                <div class="card">
                    <div class="table-wrapper" id="usersTable">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Cargando usuarios...</p>
                        </div>
                    </div>
                    <div id="paginationContainer"></div>
                </div>
            </div>

            <div id="viewForm" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title" id="formTitle">Nuevo Usuario</h2>
                        <button class="btn btn-secondary" onclick="hideForm()"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Volver</button>
                    </div>

                    <form id="userForm" onsubmit="saveUser(event)">
                        <input type="hidden" id="editId">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-input" id="fNombre" placeholder="Ej: Juan" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Apellido</label>
                                <input type="text" class="form-input" id="fApellido" placeholder="Ej: Pérez" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Usuario</label>
                                <input type="text" class="form-input" id="fUsuario" placeholder="Ej: jperez" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" id="fEmail" placeholder="correo@empresa.com" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" id="passLabel">Contraseña</label>
                                <input type="password" class="form-input" id="fPassword" placeholder="Mínimo 6 caracteres">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Rol</label>
                                <select class="form-select" id="fRol" required>
                                    <option value="empleado">Empleado</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="saveBtn"><span class="material-symbols-outlined" style="font-size:18px">save</span> Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="hideForm()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        // ============================================
        // FUNCIONES PARA EL SIDEBAR MÓVIL
        // ============================================
        function toggleSidebar(event) {
            if (event) event.preventDefault();
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', function() {
                    document.getElementById('sidebar')?.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('sidebar')?.classList.remove('active');
                    document.getElementById('sidebarOverlay')?.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });

        // Variables globales
        let currentPage = 1;
        let searchTimeout;

        const user = requireAuth('admin');
        if (user) {
            const navUser = document.getElementById('navUser');
            if (navUser) {
                const initial = (user.nombre || "U")[0].toUpperCase();
                navUser.innerHTML = `
                    <div class="nav-avatar" style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.2);color:white;display:flex;align-items:center;justify-content:center;">${initial}</div>
                    <span class="nav-username" style="color:white;">${user.nombre}</span>
                    <span class="nav-role badge badge-${user.rol === 'admin' ? 'primary' : 'success'}">${user.rol}</span>
                    <button class="btn btn-sm btn-outline" onclick="Auth.logout()" style="background:rgba(255,255,255,0.1);color:white;">
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                `;
            }
            
            loadUsers();
        }

        async function loadUsers(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            
            document.getElementById('usersTable').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando usuarios...</p>
                </div>`;

            try {
                const res = await Usuarios.list(page, search);
                let usuarios = [];
                let pagination = { page: 1, pages: 1, total: 0 };
                
                if (res && res.data) {
                    if (res.data.usuarios) {
                        usuarios = res.data.usuarios;
                        pagination = res.data.pagination || { page: 1, pages: 1, total: usuarios.length };
                    } else if (Array.isArray(res.data)) {
                        usuarios = res.data;
                    }
                }

                if (!usuarios || usuarios.length === 0) {
                    document.getElementById('usersTable').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><span class="material-symbols-outlined" style="font-size:48px">group</span></div>
                            <p>No se encontraron usuarios</p>
                        </div>`;
                    document.getElementById('paginationContainer').innerHTML = '';
                    return;
                }

                const rows = usuarios.map(u => `
                    <tr>
                        <td><strong>${u.nombre || ''} ${u.apellido || ''}</strong></td>
                        <td>${u.usuario || ''}</td>
                        <td>${u.email || ''}</td>
                        <td><span class="badge badge-${u.rol === 'admin' ? 'primary' : 'success'}">${u.rol || ''}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline" onclick="editUser(${u.id})"><span class="material-symbols-outlined" style="font-size:16px">edit</span> Editar</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id}, '${u.nombre || ''} ${u.apellido || ''}')"><span class="material-symbols-outlined" style="font-size:16px">delete</span></button>
                        </td>
                    </tr>
                `).join('');

                document.getElementById('usersTable').innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Nombre</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acciones</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>`;

                if (pagination.pages > 1) {
                    let pagHtml = '<div class="pagination">';
                    if (pagination.page > 1) {
                        pagHtml += `<button class="page-btn" data-page="${pagination.page - 1}"><span class="material-symbols-outlined">chevron_left</span> Anterior</button>`;
                    }
                    for (let i = 1; i <= pagination.pages; i++) {
                        pagHtml += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
                    }
                    if (pagination.page < pagination.pages) {
                        pagHtml += `<button class="page-btn" data-page="${pagination.page + 1}">Siguiente <span class="material-symbols-outlined">chevron_right</span></button>`;
                    }
                    pagHtml += '</div>';
                    document.getElementById('paginationContainer').innerHTML = pagHtml;
                    
                    document.querySelectorAll('.page-btn').forEach(btn => {
                        btn.onclick = function() { loadUsers(parseInt(this.dataset.page)); };
                    });
                } else {
                    document.getElementById('paginationContainer').innerHTML = '';
                }
                
            } catch (error) {
                console.error('Error cargando usuarios:', error);
                document.getElementById('usersTable').innerHTML = `
                    <div class="empty-state" style="color: var(--danger);">
                        <span class="material-symbols-outlined" style="font-size:48px;">error</span>
                        <p>Error al cargar usuarios</p>
                        <button class="btn btn-primary" onclick="loadUsers(1)" style="margin-top:1rem;">
                            <span class="material-symbols-outlined">refresh</span> Reintentar
                        </button>
                    </div>`;
            }
        }

        function searchUsers() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadUsers(1), 400);
        }

        function showForm(editData = null) {
            document.getElementById('viewList').style.display = 'none';
            document.getElementById('viewForm').style.display = 'block';
            
            if (editData) {
                document.getElementById('formTitle').textContent = 'Editar Usuario';
                document.getElementById('editId').value = editData.id;
                document.getElementById('fNombre').value = editData.nombre;
                document.getElementById('fApellido').value = editData.apellido;
                document.getElementById('fUsuario').value = editData.usuario;
                document.getElementById('fEmail').value = editData.email;
                document.getElementById('fRol').value = editData.rol;
                document.getElementById('fPassword').value = '';
                document.getElementById('fPassword').required = false;
                document.getElementById('passLabel').textContent = 'Nueva contraseña (opcional)';
            } else {
                document.getElementById('formTitle').textContent = 'Nuevo Usuario';
                document.getElementById('userForm').reset();
                document.getElementById('editId').value = '';
                document.getElementById('fPassword').required = true;
                document.getElementById('passLabel').textContent = 'Contraseña';
            }
        }

        function hideForm() {
            document.getElementById('viewList').style.display = 'block';
            document.getElementById('viewForm').style.display = 'none';
        }

        async function editUser(id) {
            try {
                const res = await Usuarios.get(id);
                showForm(res.data);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function saveUser(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            const data = {
                nombre: document.getElementById('fNombre').value,
                apellido: document.getElementById('fApellido').value,
                usuario: document.getElementById('fUsuario').value,
                email: document.getElementById('fEmail').value,
                rol: document.getElementById('fRol').value,
            };

            const password = document.getElementById('fPassword').value;
            if (password) data.password = password;

            const editId = document.getElementById('editId').value;

            try {
                if (editId) {
                    await Usuarios.update(editId, data);
                    showToast('Usuario actualizado correctamente');
                } else {
                    if (!password) {
                        showToast('La contraseña es obligatoria para nuevos usuarios', 'error');
                        btn.disabled = false;
                        return;
                    }
                    await Usuarios.create(data);
                    showToast('Usuario creado correctamente');
                }
                hideForm();
                loadUsers(currentPage);
            } catch (error) {
                console.error('Error al guardar:', error);
                showToast(error.message || 'Error al guardar', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function deleteUser(id, nombre) {
            showConfirm(`¿Estás seguro de eliminar a <strong>${nombre}</strong>?`, async () => {
                try {
                    await Usuarios.delete(id);
                    showToast('Usuario eliminado');
                    loadUsers(currentPage);
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
        }
    </script>

    <style>

            width: 300px !important;
            min-width: 300px !important;

        .sidebar-section {

            font-weight: 700;
            text-transform: uppercase;

            color: var(--gray-400);

            margin-bottom: 0.75rem;
        }

            display: flex !important;

        .sidebar-link.active {

        .sidebar-link.active .material-symbols-outlined {

        .sidebar-link:hover {
            background: var(--gray-100) !important;
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: 2px 0 15px rgba(0,0,0,0.2);
                padding-top: 70px;
            }
            .sidebar.active { left: 0; }
            .sidebar-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .sidebar-overlay.active { display: block; }
            .nav-hamburger { display: flex !important; }
        }
        
        @media (min-width: 1025px) {
            .nav-hamburger { display: none !important; }
        }
    </style>

</body>

</html>

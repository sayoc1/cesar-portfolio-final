<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios - Portal de Turnos</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <style>
        .table-wrapper {
            overflow-x: auto;
        }
        .btn-sm {
            margin: 0 2px;
        }
        .badge {
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
        }
        .badge-info {
            background: var(--info-bg);
            color: var(--info);
        }
        .badge-success {
            background: var(--success-bg);
            color: var(--success);
        }
        .badge-warning {
            background: var(--warning-bg);
            color: var(--warning);
        }
        .badge-primary {
            background: var(--primary-bg);
            color: var(--primary);
        }
    </style>
</head>

<body>

    <nav class="navbar" style="display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: linear-gradient(135deg, #004d2b 0%, #00723f 100%); height: 64px;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="nav-hamburger" id="sidebarToggle" style="background: transparent; border: none; color: white; cursor: pointer; padding: 8px;">
                <span class="material-symbols-outlined" style="font-size: 28px;">menu</span>
            </button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="/portal_turno_v2/assets/img/logo-banco.png" alt="BAV" style="height: 40px; width: auto; border-radius: 8px; background: white; padding: 3px;" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IndoaXRlIiByeD0iOCIvPjx0ZXh0IHg9IjUiIHk9IjI4IiBmb250LWZhbWlseT0iSW50ZXIsIHNhbnMtc2VyaWYiIGZpbGw9IiMwMDcyM2YiIGZvbnQtc2l6ZT0iMjAiIGZvbnQtd2VpZ2h0PSJib2xkIj5CQVY8L3RleHQ+PC9zdmc+';">
                <span style="color: white; font-weight: 700; font-size: 1.1rem;">Banco Agrícola de Venezuela</span>
            </div>
        </div>
        <div class="nav-user" id="navUser"></div>
    </nav>

    <div class="layout">
        <!-- ========== SIDEBAR CON ENLACE A DETALLE EMPLEADO ========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">PRINCIPAL</div>
                <a class="sidebar-link" href="dashboard.html">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Dashboard</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">GESTIÓN</div>
                <a class="sidebar-link" href="usuarios.html">
                    <span class="material-symbols-outlined">group</span>
                    <span>Usuarios</span>
                </a>
                <a class="sidebar-link active" href="horarios.html">
                    <span class="material-symbols-outlined">calendar_month</span>
                    <span>Horarios</span>
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">REPORTES</div>
                <a class="sidebar-link" href="turnos.html">
                    <span class="material-symbols-outlined">schedule</span>
                    <span>Historial de Turnos</span>
                </a>
                <a class="sidebar-link" href="empleado-detalle.html">
                    <span class="material-symbols-outlined">person_search</span>
                    <span>Detalle Empleado</span>
                </a>
                <a class="sidebar-link" href="reportes.html">
                    <span class="material-symbols-outlined">trending_up</span>
                    <span>Reportes</span>
                </a>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Horarios</h1>
                <p class="page-subtitle">Asignación de horarios a empleados</p>
            </div>

            <!-- Vista lista -->
            <div id="viewList">
                <div class="toolbar">
                    <div class="search-box">
                        <span class="search-icon"><span class="material-symbols-outlined" style="font-size:18px">search</span></span>
                        <input type="text" id="searchInput" placeholder="Buscar por empleado..." oninput="searchHorarios()">
                    </div>
                    <button class="btn btn-primary" onclick="showForm()"><span class="material-symbols-outlined" style="font-size:18px">add</span> Asignar Horario</button>
                </div>

                <div class="card">
                    <div class="table-wrapper" id="horariosTable">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Cargando horarios...</p>
                        </div>
                    </div>
                    <div id="paginationContainer"></div>
                </div>
            </div>

            <!-- Formulario crear/editar -->
            <div id="viewForm" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title" id="formTitle">Asignar Horario</h2>
                        <button class="btn btn-secondary" onclick="hideForm()"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Volver</button>
                    </div>

                    <form id="horarioForm" onsubmit="saveHorario(event)">
                        <input type="hidden" id="editId">

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Empleado</label>
                                <select class="form-select" id="fEmpleado" required>
                                    <option value="">Seleccionar empleado...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Fecha</label>
                                <input type="date" class="form-input" id="fFecha" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Hora de Inicio</label>
                                <input type="time" class="form-input" id="fInicio" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Hora de Fin</label>
                                <input type="time" class="form-input" id="fFin" required>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="saveBtn"><span class="material-symbols-outlined" style="font-size:18px">save</span> Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="hideForm()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        // ============================================
        // FUNCIONES PARA EL SIDEBAR MÓVIL
        // ============================================
        function toggleSidebar(event) {
            if (event) event.preventDefault();
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', function() {
                    document.getElementById('sidebar')?.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            }
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.getElementById('sidebar')?.classList.remove('active');
                    document.getElementById('sidebarOverlay')?.classList.remove('active');
                    document.body.style.overflow = '';
                }
            });
        });

        // Variables globales
        let currentPage = 1;
        let searchTimeout;

        const user = requireAuth('admin');
        if (user) {
            const navUser = document.getElementById('navUser');
            if (navUser) {
                const initial = (user.nombre || "U")[0].toUpperCase();
                navUser.innerHTML = `
                    <div class="nav-avatar" style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.2);color:white;display:flex;align-items:center;justify-content:center;">${initial}</div>
                    <span class="nav-username" style="color:white;">${user.nombre}</span>
                    <span class="nav-role badge badge-${user.rol === 'admin' ? 'primary' : 'success'}">${user.rol}</span>
                    <button class="btn btn-sm btn-outline" onclick="Auth.logout()" style="background:rgba(255,255,255,0.1);color:white;">
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                `;
            }
            
            loadEmpleados();
            loadHorarios();
        }

        async function loadEmpleados() {
            try {
                const res = await Usuarios.list(1, '', 100);
                const empleados = res.data?.usuarios?.filter(u => u.rol === 'empleado') || [];
                const select = document.getElementById('fEmpleado');
                
                empleados.forEach(e => {
                    const opt = document.createElement('option');
                    opt.value = e.id;
                    opt.textContent = `${e.nombre} ${e.apellido}`;
                    select.appendChild(opt);
                });
            } catch (error) {
                console.error('Error cargando empleados:', error);
                showToast('No se pudieron cargar los empleados', 'error');
            }
        }

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '—';
            if (dateStr.includes('-')) {
                const partes = dateStr.split('-');
                if (partes.length === 3) {
                    return `${partes[2]}/${partes[1]}/${partes[0]}`;
                }
            }
            return dateStr;
        }

        async function loadHorarios(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            
            document.getElementById('horariosTable').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando horarios...</p>
                </div>`;

            try {
                const res = await Horarios.list(page, search);
                
                let horarios = [];
                let pagination = { page: 1, pages: 1, total: 0 };
                
                if (res && res.data) {
                    if (res.data.horarios) {
                        horarios = res.data.horarios;
                        pagination = res.data.pagination || { page: 1, pages: 1, total: horarios.length };
                    } else if (Array.isArray(res.data)) {
                        horarios = res.data;
                    }
                }

                if (!horarios || horarios.length === 0) {
                    document.getElementById('horariosTable').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><span class="material-symbols-outlined" style="font-size:48px">calendar_month</span></div>
                            <p>No se encontraron horarios</p>
                        </div>`;
                    document.getElementById('paginationContainer').innerHTML = '';
                    return;
                }

                const rows = horarios.map(h => {
                    const nombreCompleto = h.empleado_nombre ? `${h.empleado_nombre} ${h.empleado_apellido}` : `ID: ${h.id_usuario}`;
                    return `
                        <tr>
                            <td><strong>${nombreCompleto}</strong></td>
                            <td>${formatDateDisplay(h.fecha)}</td>
                            <td><span class="badge badge-info">${h.hora_inicio}</span></td>
                            <td><span class="badge badge-warning">${h.hora_fin}</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline" onclick="editHorario(${h.id})"><span class="material-symbols-outlined" style="font-size:16px">edit</span> Editar</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteHorario(${h.id}, '${nombreCompleto}')"><span class="material-symbols-outlined" style="font-size:16px">delete</span></button>
                            </td>
                        </tr>`;
                }).join('');

                document.getElementById('horariosTable').innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Empleado</th><th>Fecha</th><th>Inicio</th><th>Fin</th><th>Acciones</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>`;

                if (pagination.pages > 1) {
                    let pagHtml = '<div class="pagination">';
                    if (pagination.page > 1) {
                        pagHtml += `<button class="page-btn" data-page="${pagination.page - 1}"><span class="material-symbols-outlined">chevron_left</span> Anterior</button>`;
                    }
                    for (let i = 1; i <= pagination.pages; i++) {
                        pagHtml += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
                    }
                    if (pagination.page < pagination.pages) {
                        pagHtml += `<button class="page-btn" data-page="${pagination.page + 1}">Siguiente <span class="material-symbols-outlined">chevron_right</span></button>`;
                    }
                    pagHtml += '</div>';
                    document.getElementById('paginationContainer').innerHTML = pagHtml;
                    
                    document.querySelectorAll('.page-btn').forEach(btn => {
                        btn.onclick = function() { loadHorarios(parseInt(this.dataset.page)); };
                    });
                } else {
                    document.getElementById('paginationContainer').innerHTML = '';
                }
                
            } catch (error) {
                console.error('Error cargando horarios:', error);
                document.getElementById('horariosTable').innerHTML = `
                    <div class="empty-state" style="color: var(--danger);">
                        <span class="material-symbols-outlined" style="font-size:48px;">error</span>
                        <p>Error al cargar horarios</p>
                        <button class="btn btn-primary" onclick="loadHorarios(1)" style="margin-top:1rem;">
                            <span class="material-symbols-outlined">refresh</span> Reintentar
                        </button>
                    </div>`;
            }
        }

        function searchHorarios() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadHorarios(1), 400);
        }

        function showForm(editData = null) {
            document.getElementById('viewList').style.display = 'none';
            document.getElementById('viewForm').style.display = 'block';

            if (editData) {
                document.getElementById('formTitle').textContent = 'Editar Horario';
                document.getElementById('editId').value = editData.id;
                document.getElementById('fEmpleado').value = editData.id_usuario;
                document.getElementById('fFecha').value = editData.fecha;
                document.getElementById('fInicio').value = editData.hora_inicio;
                document.getElementById('fFin').value = editData.hora_fin;
            } else {
                document.getElementById('formTitle').textContent = 'Asignar Horario';
                document.getElementById('horarioForm').reset();
                document.getElementById('editId').value = '';
                const hoy = new Date().toISOString().split('T')[0];
                document.getElementById('fFecha').value = hoy;
            }
        }

        function hideForm() {
            document.getElementById('viewList').style.display = 'block';
            document.getElementById('viewForm').style.display = 'none';
        }

        async function editHorario(id) {
            try {
                const res = await Horarios.get(id);
                showForm(res.data);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function saveHorario(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            const usuarioId = document.getElementById('fEmpleado').value;
            const fecha = document.getElementById('fFecha').value;
            const inicio = document.getElementById('fInicio').value;
            const fin = document.getElementById('fFin').value;

            if (!usuarioId || !fecha || !inicio || !fin) {
                showToast('Todos los campos son obligatorios', 'error');
                btn.disabled = false;
                return;
            }

            const usuarioIdNum = parseInt(usuarioId, 10);
            if (isNaN(usuarioIdNum)) {
                showToast('Seleccione un empleado válido', 'error');
                btn.disabled = false;
                return;
            }

            const data = {
                id_usuario: usuarioIdNum,
                fecha: fecha,
                hora_inicio: inicio,
                hora_fin: fin
            };

            const editId = document.getElementById('editId').value;

            try {
                if (editId) {
                    await Horarios.update(editId, data);
                    showToast('Horario actualizado correctamente');
                } else {
                    await Horarios.create(data);
                    showToast('Horario asignado correctamente');
                }
                hideForm();
                loadHorarios(currentPage);
            } catch (error) {
                console.error('Error al guardar:', error);
                showToast(error.message || 'Error al guardar', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function deleteHorario(id, nombre) {
            showConfirm(`¿Eliminar horario de <strong>${nombre}</strong>?`, async () => {
                try {
                    await Horarios.delete(id);
                    showToast('Horario eliminado');
                    loadHorarios(currentPage);
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
        }
    </script>

        /* Secciones */
        .sidebar-section {

        .sidebar-label {

        /* Overlay para móvil */

            bottom: 0;

        .sidebar-overlay.active {
            display: block;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: -320px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s ease;
                padding-top: 70px;
                box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            }
            .sidebar.active {
                left: 0;
            }
            .nav-hamburger {
                display: flex !important;
            }
            .main-content {
                margin-left: 0 !important;
                width: 100%;
            }
        }
        
        @media (min-width: 1025px) {
            .nav-hamburger {
                display: none !important;
            }
            .main-content {
                margin-left: 0;
                flex: 1;
            }
        }
    </style>

</body>

</html>

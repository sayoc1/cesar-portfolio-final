    <script>
        const user = requireAuth('empleado');
        if (user) {
            const navUser = document.getElementById('navUser');
            if (navUser) {
                const initial = (user.nombre || "U")[0].toUpperCase();
                navUser.innerHTML = `
                    <div class="nav-avatar" style="width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem; border: 1px solid rgba(255,255,255,0.25);">${initial}</div>
                    <span class="nav-username" style="font-weight: 500; color: rgba(255,255,255,0.9); font-size: 0.875rem;">${user.nombre} ${user.apellido || ""}</span>
                    <span class="nav-role badge badge-${user.rol === "admin" ? "primary" : "success"}" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">${user.rol}</span>
                    <button class="btn btn-sm btn-outline" onclick="Auth.logout()" title="Cerrar sesión" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: white;">
                        <span class="material-symbols-outlined" style="font-size:18px">logout</span>
                    </button>
                `;
            }
            
            function setupMobileSidebar() {
                const toggle = document.getElementById('sidebarToggle');
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                
                if (!toggle || !sidebar || !overlay) return;
                
                function openSidebar() {
                    sidebar.classList.add('sidebar-open');
                    overlay.classList.add('show');
                    document.body.style.overflow = 'hidden';
                }
                
                function closeSidebar() {
                    sidebar.classList.remove('sidebar-open');
                    overlay.classList.remove('show');
                    document.body.style.overflow = '';
                }
                
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (sidebar.classList.contains('sidebar-open')) {
                        closeSidebar();
                    } else {
                        openSidebar();
                    }
                });
                
                overlay.addEventListener('click', closeSidebar);
                
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && sidebar.classList.contains('sidebar-open')) {
                        closeSidebar();
                    }
                });
                
                window.addEventListener('resize', function() {
                    if (window.innerWidth > 1024 && sidebar.classList.contains('sidebar-open')) {
                        closeSidebar();
                    }
                });
            }
            
            setTimeout(setupMobileSidebar, 100);
            loadHorarios();
        }

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '—';
            if (dateStr.includes(' ')) {
                const soloFecha = dateStr.split(' ')[0];
                if (soloFecha.includes('-')) {
                    const partes = soloFecha.split('-');
                    if (partes.length === 3) {
                        return `${partes[2]}/${partes[1]}/${partes[0]}`;
                    }
                }
            }
            if (dateStr.includes('-')) {
                const partes = dateStr.split('-');
                if (partes.length === 3) {
                    return `${partes[2]}/${partes[1]}/${partes[0]}`;
                }
            }
            return dateStr;
        }

        function formatHour(timeStr) {
            if (!timeStr) return '--:--';
            return timeStr.substring(0, 5);
        }

       // ============================================
// FUNCIÓN PARA CARGAR HORARIOS - VERSIÓN CON ENDPOINT CORRECTO
// ============================================
async function loadHorarios() {
    showLoading('#horariosTable');
    try {
        const res = await Horarios.misHorarios();
        console.log('✅ Horarios recibidos:', res);
        
        let horarios = [];
        if (res.data) {
            if (Array.isArray(res.data)) {
                horarios = res.data;
            } else if (res.data.horarios) {
                horarios = res.data.horarios;
            }
        }
        
        if (horarios.length === 0) {
            document.getElementById('horariosTable').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><span class="material-symbols-outlined" style="font-size:48px">calendar_month</span></div>
                    <p>No tienes horarios asignados</p>
                </div>`;
            return;
        }

        const hoy = new Date();
        const año = hoy.getFullYear();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const dia = String(hoy.getDate()).padStart(2, '0');
        const hoyStr = `${año}-${mes}-${dia}`;
        
        // Obtener turnos completados del empleado usando el nuevo endpoint
        let turnosCompletados = {};
        
        try {
            const completadosRes = await Turnos.misCompletados();
            console.log('✅ Turnos completados:', completadosRes);
            
            if (completadosRes.data && Array.isArray(completadosRes.data)) {
                completadosRes.data.forEach(t => {
                    if (t.fecha) {
                        turnosCompletados[t.fecha] = true;
                        console.log('📅 Turno completado en fecha:', t.fecha);
                    }
                });
            }
        } catch (e) {
            console.error('Error cargando turnos completados:', e);
        }

        console.log('📊 Turnos completados por fecha:', turnosCompletados);

        horarios.sort((a, b) => {
            if (a.fecha > b.fecha) return -1;
            if (a.fecha < b.fecha) return 1;
            return 0;
        });

        const rows = horarios.map(h => {
            const fechaHorarioStr = h.fecha;
            
            const esPasado = fechaHorarioStr < hoyStr;
            const esHoy = fechaHorarioStr === hoyStr;
            const fueCompletado = turnosCompletados[fechaHorarioStr];
            
            let badgeClass = 'badge-info';
            let estado = 'Próximo';

            if (fueCompletado) {
                badgeClass = 'badge-success';
                estado = 'Completado';
            } else if (esHoy) {
                badgeClass = 'badge-warning';
                estado = 'Pendiente';
            } else if (esPasado) {
                badgeClass = 'badge-secondary';
                estado = 'No realizado';
            } else {
                const fechaHorario = new Date(fechaHorarioStr + 'T12:00:00');
                const fechaHoy = new Date(hoyStr + 'T12:00:00');
                const diffTime = fechaHorario - fechaHoy;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    badgeClass = 'badge-info';
                    estado = 'Mañana';
                } else {
                    badgeClass = 'badge-primary';
                    estado = 'Próximo';
                }
            }

            const horaInicio = h.hora_inicio ? formatHour(h.hora_inicio) : '--:--';
            const horaFin = h.hora_fin ? formatHour(h.hora_fin) : '--:--';

            return `
                <tr>
                    <td>
                        ${formatDateDisplay(fechaHorarioStr)} 
                        <span class="badge ${badgeClass}" style="margin-left: 0.5rem;">${estado}</span>
                    </td>
                    <td><span class="badge badge-info">${horaInicio}</span></td>
                    <td><span class="badge badge-warning">${horaFin}</span></td>
                </tr>`;
        }).join('');

        document.getElementById('horariosTable').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora de Entrada</th>
                        <th>Hora de Salida</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    } catch (error) {
        console.error('❌ Error cargando horarios:', error);
        document.getElementById('horariosTable').innerHTML = `
            <div class="empty-state" style="color: var(--danger);">
                <span class="material-symbols-outlined">error</span>
                <p>Error al cargar horarios</p>
            </div>`;
    }
}

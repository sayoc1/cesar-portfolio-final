<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora - Portal de Turnos</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <style>
        /* Estilos para el sidebar móvil */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                top: 64px;
                left: -280px;
                width: 268px;
                height: calc(100vh - 64px);
                box-shadow: var(--shadow-xl);
                z-index: 90;
                transition: left 0.3s ease;
                will-change: left;
            }
            
            .sidebar.sidebar-open {
                left: 0;
            }
            
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.45);
                z-index: 89;
                backdrop-filter: blur(2px);
                opacity: 0;
                transition: opacity 0.3s ease;
                pointer-events: none;
            }
            
            .sidebar-overlay.show {
                display: block;
                opacity: 1;
                pointer-events: auto;
            }
        }

        /* Mejoras para las bitácoras */
        .detail-list-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .detail-list-item:hover {
            border-left-color: var(--primary);
            transform: translateX(5px);
        }
        .detail-list-item .badge {
            font-size: 0.85rem;
            padding: 0.35rem 0.8rem;
        }
        .detail-list-item strong {
            font-size: 0.95rem;
            color: var(--gray-800);
        }
        .detail-list-item p {
            font-size: 0.95rem;
            line-height: 1.5;
            padding-left: 0.5rem;
            border-left: 2px solid var(--gray-200);
            margin-top: 0.5rem;
            color: var(--gray-600);
        }
    </style>
</head>

<body>

    <!-- Navbar con logo fijo y botón hamburguesa -->
    <nav class="navbar" style="display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: linear-gradient(135deg, #004d2b 0%, #00723f 100%); height: 64px;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="nav-hamburger" id="sidebarToggle" style="background: transparent; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px;">
                <span class="material-symbols-outlined" style="font-size: 28px;">menu</span>
            </button>
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="/portal_turno_v2/assets/img/logo-banco.png" alt="BAV" style="height: 40px; width: auto; border-radius: 8px; background: white; padding: 3px;" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIGZpbGw9IndoaXRlIiByeD0iOCIvPjx0ZXh0IHg9IjUiIHk9IjI4IiBmb250LWZhbWlseT0iSW50ZXIsIHNhbnMtc2VyaWYiIGZpbGw9IiMwMDcyM2YiIGZvbnQtc2l6ZT0iMjAiIGZvbnQtd2VpZ2h0PSJib2xkIj5CQVY8L3RleHQ+PC9zdmc+';">
                <span style="color: white; font-weight: 700; font-size: 1.1rem;">Banco Agrícola de Venezuela</span>
            </div>
        </div>
        <div class="nav-user" id="navUser" style="display: flex; align-items: center; gap: 1rem;"></div>
    </nav>

    <div class="layout">
        <!-- Sidebar para EMPLEADO CON AYUDA Y MANUAL AS400 -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">PRINCIPAL</div>
                <a class="sidebar-link" href="dashboard.html">
                    <span class="material-symbols-outlined">home</span> Mi Panel
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">MI TURNO</div>
                <a class="sidebar-link active" href="bitacora.html">
                    <span class="material-symbols-outlined">edit_note</span> Bitácora
                </a>
                <a class="sidebar-link" href="novedad.html">
                    <span class="material-symbols-outlined">warning</span> Novedades
                </a>
                <a class="sidebar-link" href="recorrido.html">
                    <span class="material-symbols-outlined">route</span> Hoja de Recorrido
                </a>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-label">CONSULTAS</div>
                <a class="sidebar-link" href="horarios.html">
                    <span class="material-symbols-outlined">calendar_month</span> Mis Horarios
                </a>
            </div>

            <!-- SECCIÓN AYUDA CON MANUAL AS400 -->
            <div class="sidebar-section">
                <div class="sidebar-label">AYUDA</div>
                <a class="sidebar-link" href="manual-as400.html">
                    <span class="material-symbols-outlined">menu_book</span> Manual AS400
                </a>
            </div>
        </aside>

        <!-- Overlay para el sidebar móvil -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Bitácora</h1>
                <p class="page-subtitle">Registro de actividades durante el turno</p>
            </div>

            <!-- Formulario -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <h3 class="card-title"><span class="material-symbols-outlined"
                            style="font-size:20px;vertical-align:middle">edit_note</span> Nueva Entrada</h3>
                </div>
                <form onsubmit="guardarBitacora(event)">
                    <div class="form-group">
                        <label class="form-label">Descripción de la actividad</label>
                        <textarea class="form-textarea" id="fDescripcion" rows="4"
                            placeholder="Describe la actividad realizada durante el turno..." required></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="saveBtn"><span
                                class="material-symbols-outlined" style="font-size:18px">edit_note</span>
                            Registrar</button>
                    </div>
                </form>
            </div>

            <!-- Lista de bitácoras -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><span class="material-symbols-outlined"
                            style="font-size:20px;vertical-align:middle">assignment</span> Mis Registros</h3>
                </div>
                <div id="bitacoraList"></div>
            </div>
        </main>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        const user = requireAuth('empleado');
        if (user) {
            // Cargar usuario en el navbar
            const navUser = document.getElementById('navUser');
            if (navUser) {
                const initial = (user.nombre || "U")[0].toUpperCase();
                navUser.innerHTML = `
                    <div class="nav-avatar" style="width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem; border: 1px solid rgba(255,255,255,0.25);">${initial}</div>
                    <span class="nav-username" style="font-weight: 500; color: rgba(255,255,255,0.9); font-size: 0.875rem;">${user.nombre} ${user.apellido || ""}</span>
                    <span class="nav-role badge badge-${user.rol === "admin" ? "primary" : "success"}" style="background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);">${user.rol}</span>
                    <button class="btn btn-sm btn-outline" onclick="Auth.logout()" title="Cerrar sesión" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: white;">
                        <span class="material-symbols-outlined" style="font-size:18px">logout</span>
                    </button>
                `;
            }
            
            // ============================================
            // FUNCIÓN PARA MANEJAR EL SIDEBAR MÓVIL
            // ============================================
            function setupMobileSidebar() {
                const toggle = document.getElementById('sidebarToggle');
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                
                if (!toggle || !sidebar || !overlay) {
                    return;
                }
                
                function openSidebar() {
                    sidebar.classList.add('sidebar-open');
                    overlay.classList.add('show');
                    document.body.style.overflow = 'hidden';
                }
                
                function closeSidebar() {
                    sidebar.classList.remove('sidebar-open');
                    overlay.classList.remove('show');
                    document.body.style.overflow = '';
                }
                
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    if (sidebar.classList.contains('sidebar-open')) {
                        closeSidebar();
                    } else {
                        openSidebar();
                    }
                });
                
                overlay.addEventListener('click', closeSidebar);
                
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && sidebar.classList.contains('sidebar-open')) {
                        closeSidebar();
                    }
                });
                
                window.addEventListener('resize', function() {
                    if (window.innerWidth > 1024 && sidebar.classList.contains('sidebar-open')) {
                        closeSidebar();
                    }
                });
            }
            
            // Inicializar el sidebar
            setTimeout(setupMobileSidebar, 100);
            
            loadBitacoras();
        }

        // ============================================
        // FUNCIÓN PARA FORMATEAR FECHA CORRECTAMENTE
        // ============================================
        function formatDateDisplay(dateStr) {
            if (!dateStr) return '—';
            
            // Si es una fecha completa (YYYY-MM-DD HH:MM:SS)
            if (dateStr.includes(' ')) {
                const soloFecha = dateStr.split(' ')[0];
                if (soloFecha.includes('-')) {
                    const partes = soloFecha.split('-');
                    if (partes.length === 3) {
                        return `${partes[2]}/${partes[1]}/${partes[0]}`;
                    }
                }
            }
            
            // Si viene en formato YYYY-MM-DD
            if (dateStr.includes('-') && !dateStr.includes(' ')) {
                const partes = dateStr.split('-');
                if (partes.length === 3) {
                    return `${partes[2]}/${partes[1]}/${partes[0]}`;
                }
            }
            
            return dateStr;
        }

        // ============================================
        // FUNCIÓN PARA FORMATEAR HORA (SOLO HH:MM)
        // ============================================
        function formatTimeDisplay(dateStr) {
            if (!dateStr) return '--:--';
            
            // Si es una fecha completa (YYYY-MM-DD HH:MM:SS)
            if (dateStr.includes(' ')) {
                const partes = dateStr.split(' ');
                if (partes.length > 1) {
                    const horaPartes = partes[1].split(':');
                    if (horaPartes.length >= 2) {
                        return `${horaPartes[0]}:${horaPartes[1]}`;
                    }
                }
            }
            
            return '--:--';
        }

        // ============================================
        // FUNCIÓN PARA CARGAR BITÁCORAS
        // ============================================
        async function loadBitacoras() {
            showLoading('#bitacoraList');
            try {
                const res = await Bitacoras.list();
                console.log('Bitácoras recibidas:', res);
                
                let bitacoras = [];
                if (res.data) {
                    if (Array.isArray(res.data)) {
                        bitacoras = res.data;
                    } else if (res.data.bitacoras) {
                        bitacoras = res.data.bitacoras;
                    }
                }

                if (bitacoras.length === 0) {
                    document.getElementById('bitacoraList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><span class="material-symbols-outlined" style="font-size:48px">edit_note</span></div>
                            <p>No has registrado entradas en la bitácora</p>
                        </div>`;
                    return;
                }

                const items = bitacoras.map(b => {
                    // Obtener nombre del empleado
                    const nombreEmpleado = b.nombre && b.apellido ? `${b.nombre} ${b.apellido}` : 'Tú';
                    
                    // Formatear fecha y hora
                    const fechaFormateada = formatDateDisplay(b.fecha || b.created_at || '');
                    const hora = formatTimeDisplay(b.fecha || b.created_at || '');
                    
                    // Determinar qué campo de descripción usar
                    const descripcion = b.actividad || b.descripcion || b.texto || '';
                    
                    return `
                        <div class="detail-list-item">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                                <div style="display:flex; align-items:center; gap:0.5rem;">
                                    <span class="badge badge-primary">${hora}</span>
                                    <strong style="color: var(--primary);">${nombreEmpleado}</strong>
                                </div>
                                <span style="color: var(--gray-400); font-size: 0.8rem;">${fechaFormateada}</span>
                            </div>
                            <p style="color: var(--gray-700); margin-top:0.25rem;">${descripcion}</p>
                        </div>
                    `;
                }).join('');

                document.getElementById('bitacoraList').innerHTML = `<div class="detail-list">${items}</div>`;
            } catch (error) {
                console.error('Error cargando bitácoras:', error);
                document.getElementById('bitacoraList').innerHTML = `
                    <div class="empty-state" style="color: var(--danger);">
                        <span class="material-symbols-outlined">error</span>
                        <p>Error al cargar bitácoras</p>
                    </div>`;
            }
        }

        // ============================================
        // FUNCIÓN PARA GUARDAR BITÁCORA
        // ============================================
        async function guardarBitacora(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            const descripcion = document.getElementById('fDescripcion').value;

            try {
                await Bitacoras.create({ descripcion });
                showToast('✅ Bitácora registrada correctamente');
                document.getElementById('fDescripcion').value = '';
                loadBitacoras();
            } catch (error) {
                console.error('Error al guardar bitácora:', error);
                showToast(error.message || 'Error al guardar. ¿Tienes un turno activo?', 'error');
            } finally {
                btn.disabled = false;
            }
        }
    </script>

</body>

</html>
